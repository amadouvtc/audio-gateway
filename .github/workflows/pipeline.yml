name: Audio Gateway CI (Industrial Standard)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # This enables the high-speed 'type=cache' mounts we put in the Dockerfile
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Step 1: Static Analysis Gate
    # We only run the 'audit' stage. If cppcheck fails, CI stops here.
    - name: 1. Run Static Analysis (Audit)
      run: |
        docker build --target audit \
          --cache-from type=gha \
          --cache-to type=gha,mode=max \
          -t gateway-audit .

    # Step 2: Full Compilation & Packaging
    # Docker skips the audit because it's already cached from Step 1.
    - name: 2. Build Production Image
      run: |
        docker build \
          --cache-from type=gha \
          --cache-to type=gha,mode=max \
          -t audio-gateway:latest .

    # Step 3: Unit Testing
    # We run the tests that were compiled inside the image.
    - name: 3. Run GTest Suite
      run: |
        docker run --entrypoint ctest audio-gateway:latest --output-on-failure

    # Step 4: Fuzzing (The "Final Boss")
    # We use a separate cache for the Fuzzer's "Brain" (the corpus)
    - name: Restore Fuzz Corpus
      uses: actions/cache@v4
      with:
        path: tests/fuzz/corpus
        key: fuzz-corpus-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          fuzz-corpus-${{ runner.os }}-

    - name: 4. Run Controlled Fuzz
      # We mount the corpus folder from the runner into the container
      run: |
        mkdir -p tests/fuzz/corpus
        docker run -v $(pwd)/tests/fuzz/corpus:/app/corpus \
          --entrypoint ./fuzz_ring_buffer \
          audio-gateway:latest \
          -max_total_time=60 -rss_limit_mb=2048 /app/corpus